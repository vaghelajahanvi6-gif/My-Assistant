<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Assistant</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Assistant">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 32px 24px; background: linear-gradient(160deg, #4f46e5 0%, #7c3aed 100%); color: white; }
        #setup-screen .logo { font-size: 64px; margin-bottom: 16px; }
        #setup-screen h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        #setup-screen p { opacity: 0.85; margin-bottom: 36px; text-align: center; font-size: 14px; line-height: 1.6; }
        #setup-screen input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid transparent; font-size: 15px; margin-bottom: 12px; outline: none; background: rgba(255,255,255,0.95); color: #1f2937; }
        #setup-screen input:focus { border-color: #c4b5fd; }
        #setup-screen button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: white; color: #4f46e5; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-top: 4px; }
        #setup-screen .hint { margin-top: 20px; font-size: 12px; opacity: 0.75; text-align: center; line-height: 1.8; }
        #setup-screen a { color: #c4b5fd; text-decoration: underline; }
        #app { display: none; flex-direction: column; height: 100vh; }
        .header { background: #4f46e5; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(79,70,229,0.3); flex-shrink: 0; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-avatar { width: 36px; height: 36px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .header-title { font-size: 16px; font-weight: 600; }
        .header-sub { font-size: 11px; opacity: 0.8; }
        .header-actions { display: flex; gap: 8px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 7px 11px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 500; }
        #reminder-alert { display: none; background: #f59e0b; color: white; padding: 12px 16px; font-size: 14px; font-weight: 500; align-items: center; justify-content: space-between; flex-shrink: 0; }
        #reminder-alert.visible { display: flex; }
        #reminder-alert button { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        #chat { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        .msg { max-width: 82%; display: flex; flex-direction: column; }
        .msg.user { align-self: flex-end; align-items: flex-end; }
        .msg.assistant { align-self: flex-start; align-items: flex-start; }
        .msg.center { align-self: center; align-items: center; }
        .bubble { padding: 11px 15px; border-radius: 18px; font-size: 15px; line-height: 1.55; word-break: break-word; }
        .msg.user .bubble { background: #4f46e5; color: white; border-bottom-right-radius: 4px; }
        .msg.assistant .bubble { background: white; color: #1f2937; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .msg.center .bubble { background: #e9eaf0; color: #6b7280; font-size: 12px; padding: 6px 14px; border-radius: 20px; }
        .typing-bubble { background: white; padding: 14px 18px; border-radius: 18px; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); align-self: flex-start; }
        .typing-bubble span { display: inline-block; width: 7px; height: 7px; background: #9ca3af; border-radius: 50%; animation: bounce 1.2s infinite; margin: 0 2px; }
        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
        .input-bar { padding: 10px 12px; background: white; border-top: 1px solid #e5e7eb; display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; }
        #user-input { flex: 1; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 22px; font-size: 15px; outline: none; resize: none; max-height: 110px; font-family: inherit; line-height: 1.4; background: #f9fafb; color: #1f2937; }
        #user-input:focus { border-color: #4f46e5; background: white; }
        #send-btn { background: #4f46e5; color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #send-btn:disabled { opacity: 0.45; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99; }
        .overlay.open { display: block; }
        #memory-panel { display: none; position: fixed; top: 0; right: 0; width: 88%; max-width: 360px; height: 100vh; background: white; box-shadow: -4px 0 24px rgba(0,0,0,0.12); z-index: 100; overflow-y: auto; flex-direction: column; }
        #memory-panel.open { display: flex; }
        .panel-header { padding: 16px; background: #4f46e5; color: white; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .panel-header span { font-weight: 600; font-size: 16px; }
        .panel-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; }
        .panel-clear { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .mem-item { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; }
        .mem-tag { font-size: 11px; background: #ede9fe; color: #6d28d9; padding: 2px 9px; border-radius: 10px; display: inline-block; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .mem-tag.reminder { background: #fef3c7; color: #92400e; }
        .mem-content { font-size: 14px; color: #374151; line-height: 1.5; }
        .mem-time { font-size: 11px; color: #9ca3af; margin-top: 5px; }
        .mem-status { float: right; font-size: 11px; font-weight: 600; }
        .done { color: #10b981; } .pending { color: #f59e0b; }
        .empty-state { padding: 48px 24px; text-align: center; color: #9ca3af; font-size: 14px; line-height: 1.7; }
        .empty-state div { font-size: 40px; margin-bottom: 12px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="logo">🤖</div>
    <h1>My Personal Assistant</h1>
    <p>Your AI that remembers everything,<br>sets reminders, and helps you daily.</p>
    <input type="text" id="name-input" placeholder="Your name (e.g. Rahul)" autocomplete="off" />
    <input type="password" id="api-key-input" placeholder="Gemini API Key (AIza...)" autocomplete="off" />
    <button onclick="saveSetup()">Get Started →</button>
    <div class="hint">
        Get your FREE Gemini API key at<br>
        <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a><br>
        No credit card · Free forever · Personal use
    </div>
</div>

<div id="app">
    <div class="header">
        <div class="header-left">
            <div class="header-avatar">🤖</div>
            <div>
                <div class="header-title">My Assistant</div>
                <div class="header-sub" id="header-sub">Always here for you</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="openMemory()">📝 Memory</button>
            <button class="header-btn" onclick="resetApp()">⚙️</button>
        </div>
    </div>
    <div id="reminder-alert">
        <span id="reminder-text"></span>
        <button onclick="closeReminderAlert()">✕</button>
    </div>
    <div id="chat"></div>
    <div class="input-bar">
        <textarea id="user-input" placeholder="Talk to me... set a reminder, save a note..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeMemory()"></div>
<div id="memory-panel">
    <div class="panel-header">
        <span>📝 Memory</span>
        <div style="display:flex;gap:8px;align-items:center">
            <button class="panel-clear" onclick="clearMemory()">Clear All</button>
            <button class="panel-close" onclick="closeMemory()">✕</button>
        </div>
    </div>
    <div id="memory-list" style="flex:1;overflow-y:auto"></div>
</div>

<script>
let apiKey='', userName='Friend', memory=[], chatHistory=[], isThinking=false;

window.addEventListener('load', () => {
    apiKey   = localStorage.getItem('pa_key')  || '';
    userName = localStorage.getItem('pa_name') || 'Friend';
    memory   = JSON.parse(localStorage.getItem('pa_memory') || '[]');
    if (apiKey) bootApp();
    setInterval(checkReminders, 60000);
    if ('Notification' in window && Notification.permission==='default') Notification.requestPermission();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
});

function saveSetup() {
    const name = document.getElementById('name-input').value.trim();
    const key  = document.getElementById('api-key-input').value.trim();
    if (!key) { alert('Please enter your Gemini API key'); return; }
    userName = name || 'Friend'; apiKey = key;
    localStorage.setItem('pa_name', userName);
    localStorage.setItem('pa_key',  apiKey);
    bootApp();
}

function bootApp() {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('header-sub').textContent = `Hi ${userName} 👋`;
    addMsg('assistant',
        `Hey ${userName}! 👋 I am your personal assistant.\n\nI remember everything you tell me — even after you close the app.\n\nTry saying:\n• "My wife name is Priya"\n• "Remind me to call Raj in 2 hours"\n• "Note: WiFi password is xyz123"\n• "What is my wife name?"`
    );
    checkReminders();
}

function resetApp() {
    if (!confirm('Reset API key and name?')) return;
    localStorage.removeItem('pa_key'); localStorage.removeItem('pa_name');
    location.reload();
}

function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

async function sendMessage() {
    if (isThinking) return;
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value=''; input.style.height='auto';
    isThinking=true; document.getElementById('send-btn').disabled=true;
    addMsg('user', text);
    chatHistory.push({ role:'user', parts:[{text}] });
    const typingEl = showTyping();
    try {
        const reply = await callGemini();
        typingEl.remove();
        const clean = processCommands(reply);
        addMsg('assistant', clean);
        chatHistory.push({ role:'model', parts:[{text:clean}] });
    } catch(err) {
        typingEl.remove();
        addMsg('assistant', `Error: ${err.message}\n\nCheck your API key. Tap the settings button to reset.`);
    }
    isThinking=false; document.getElementById('send-btn').disabled=false;
}

async function callGemini() {
    const memSummary = memory.length
        ? memory.map(m => m.type==='reminder'
            ? `[REMINDER|${m.done?'DONE':'PENDING'}|due:${new Date(m.reminder_time).toLocaleString()}] ${m.content}`
            : `[${m.type.toUpperCase()}] ${m.content}`
          ).join('\n')
        : 'No memories saved yet.';

    const systemPrompt = `You are ${userName}'s personal AI assistant. Warm, smart, perfect memory.\n\nSTORED MEMORY:\n${memSummary}\n\nRULES:\n1. When user shares personal info, acknowledge it AND add on new line: SAVE_MEMORY:[type]|[info]\n   Types: identity,family,work,password,note,date,preference,contact\n2. When asked to remind, confirm AND add: REMINDER_SET:[task]|[time e.g. in 2 hours]\n3. Use STORED MEMORY to answer questions about things user told you.\n4. Keep replies short for mobile.\n5. Never show SAVE_MEMORY or REMINDER_SET in visible text.`;

    const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
        {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                system_instruction:{ parts:[{text:systemPrompt}] },
                contents: chatHistory.slice(-20),
                generationConfig:{ maxOutputTokens:1024, temperature:0.7 }
            })
        }
    );
    if (!resp.ok) {
        const e = await resp.json().catch(()=>({}));
        throw new Error(e.error?.message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, no response.';
}

function processCommands(reply) {
    let clean = reply;
    const memMatches = [...reply.matchAll(/SAVE_MEMORY:(\w+)\|(.+)/g)];
    memMatches.forEach(m => {
        const type=m[1].toLowerCase(), content=m[2].trim();
        if (!memory.some(x=>x.content===content)) {
            memory.push({id:Date.now()+Math.random(), type, content, timestamp:Date.now()});
            saveMemory();
        }
        clean = clean.replace(m[0],'');
    });
    const remMatch = reply.match(/REMINDER_SET:([^|\n]+)\|([^\n]+)/);
    if (remMatch) {
        memory.push({id:Date.now(), type:'reminder', content:remMatch[1].trim(), timestamp:Date.now(), reminder_time:parseTime(remMatch[2].trim()), done:false});
        saveMemory();
        clean = clean.replace(remMatch[0],'');
    }
    return clean.trim();
}

function parseTime(str) {
    const rel = str.match(/in\s+(\d+)\s*(minute|min|hour|hr|day|week)s?/i);
    if (rel) { const n=parseInt(rel[1]),u=rel[2].toLowerCase(),ms={minute:60e3,min:60e3,hour:36e5,hr:36e5,day:864e5,week:6048e5}; return Date.now()+n*(ms[u]||36e5); }
    const tom = str.match(/tomorrow\s+(\d+)(?::(\d+))?\s*(am|pm)?/i);
    if (tom) { const d=new Date(); d.setDate(d.getDate()+1); let h=parseInt(tom[1]),min=parseInt(tom[2]||0); if(tom[3]?.toLowerCase()==='pm'&&h<12)h+=12; if(tom[3]?.toLowerCase()==='am'&&h===12)h=0; d.setHours(h,min,0,0); return d.getTime(); }
    const t=Date.parse(str); return isNaN(t)?Date.now()+36e5:t;
}

function checkReminders() {
    const now=Date.now();
    memory.filter(m=>m.type==='reminder'&&!m.done&&m.reminder_time&&m.reminder_time<=now).forEach(r=>{
        r.done=true;
        document.getElementById('reminder-text').textContent=`Reminder: ${r.content}`;
        document.getElementById('reminder-alert').classList.add('visible');
        addMsg('center',`Reminder: ${r.content}`);
        if(Notification.permission==='granted') new Notification('Reminder',{body:r.content});
    });
    saveMemory();
}

function closeReminderAlert() { document.getElementById('reminder-alert').classList.remove('visible'); }

function addMsg(role,text) {
    const chat=document.getElementById('chat');
    const wrap=document.createElement('div'); wrap.className=`msg ${role==='user'?'user':role==='center'?'center':'assistant'}`;
    const bub=document.createElement('div'); bub.className='bubble';
    bub.innerHTML=escapeHtml(text).replace(/\n/g,'<br>');
    wrap.appendChild(bub); chat.appendChild(wrap); chat.scrollTop=chat.scrollHeight;
}

function showTyping() {
    const chat=document.getElementById('chat');
    const d=document.createElement('div'); d.className='typing-bubble';
    d.innerHTML='<span></span><span></span><span></span>';
    chat.appendChild(d); chat.scrollTop=chat.scrollHeight; return d;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function openMemory() { renderMemoryList(); document.getElementById('memory-panel').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeMemory() { document.getElementById('memory-panel').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
function clearMemory() { if(!confirm('Delete ALL saved memory?')) return; memory=[]; saveMemory(); renderMemoryList(); }

function renderMemoryList() {
    const list=document.getElementById('memory-list');
    if(!memory.length){list.innerHTML='<div class="empty-state"><div>🧠</div>No memories yet.<br>Tell me things and I will remember!</div>';return;}
    list.innerHTML=memory.slice().reverse().map(m=>{
        const isR=m.type==='reminder';
        return `<div class="mem-item">
            <span class="mem-tag ${isR?'reminder':''}">${m.type}</span>
            ${isR?`<span class="mem-status ${m.done?'done':'pending'}">${m.done?'Done':'Pending'}</span>`:''}
            <div class="mem-content">${escapeHtml(m.content)}</div>
            ${m.reminder_time?`<div class="mem-time">Due: ${new Date(m.reminder_time).toLocaleString()}</div>`:''}
            <div class="mem-time">Saved: ${new Date(m.timestamp).toLocaleString()}</div>
        </div>`;
    }).join('');
}

function saveMemory() { localStorage.setItem('pa_memory',JSON.stringify(memory)); }
</script>
</body>
</html>
